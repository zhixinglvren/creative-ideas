<!DOCTYPE html>
<html lang="zh-CN" data-theme="system">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>创意详情 — 知行旅人</title>
  <style>
    :root {
      --bg: #faf7f2; --bg-card: #ffffff; --border: #e8e2d6;
      --text: #2c2416; --text-muted: #8c8070;
      --accent: #e07a5f; --accent-hover: #c96a50;
      --radius: 12px;
    }
    [data-theme="dark"] {
      --bg: #1a1a1e; --bg-card: #252528; --border: #38383c;
      --text: #e8e8ec; --text-muted: #98989e;
      --accent: #f0a060; --accent-hover: #d48840;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg); color: var(--text); min-height: 100vh;
      transition: background 0.3s, color 0.3s;
    }
    .wrapper { max-width: 720px; margin: 0 auto; padding: 32px 20px 60px; }

    .back { display: inline-flex; align-items: center; gap: 6px; color: var(--accent);
      text-decoration: none; font-size: 0.9rem; margin-bottom: 28px; }
    .back:hover { text-decoration: underline; }

    .hero {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 32px; margin-bottom: 24px; text-align: center;
    }
    .hero .icon { font-size: 3rem; margin-bottom: 12px; }
    .hero h1 { font-size: 1.6rem; margin-bottom: 6px; }
    .hero .tagline { color: var(--text-muted); font-size: 1rem; margin-bottom: 14px; }
    .hero .badge {
      display: inline-block; font-size: 0.8rem; font-weight: 700;
      border-radius: 14px; padding: 4px 16px;
    }
    .badge-live { background: #2e8b5722; color: #2e8b57; border: 1px solid #2e8b5744; }
    .badge-wip  { background: #b8860b22; color: #b8860b; border: 1px solid #b8860b44; }

    .section {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 24px; margin-bottom: 18px;
    }
    .section h2 { font-size: 1rem; color: var(--accent); margin-bottom: 10px; }
    .section p, .section li { color: var(--text-muted); font-size: 0.9rem; line-height: 1.7; }
    .section ul { padding-left: 20px; }
    .section li { margin-bottom: 4px; }

    .actions { text-align: center; margin-top: 28px; }
    .actions a {
      display: inline-block; background: var(--accent); color: #fff;
      padding: 12px 32px; border-radius: 10px; text-decoration: none;
      font-weight: 700; font-size: 1rem; transition: background 0.2s;
    }
    .actions a:hover { background: var(--accent-hover); }
    .actions .note {
      display: block; color: var(--text-muted); font-size: 0.8rem; margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <a href="index.html" class="back">← 返回创意实验室</a>
    <div id="content"></div>
  </div>

  <script>
    const details = {
      "goodnight-daily": {
        description: "3 个词的输入，换 5 分钟的安静。AI 把宝宝的今天编成童话——讲故事这件事，不用再靠爸妈硬编。",

          { title: "💡 方案", text: "晚安宝贝：30 秒输入孩子今天经历的 2-3 件事（开心/不开心/好奇）→ AI 生成独一无二的睡前童话 → 故事节奏渐进舒缓，帮助孩子从兴奋过渡到睡眠状态。叙事结构专业设计：先呼应孩子白天的真实经历建立共情 → 再用比喻处理负面情绪（「眼泪变成星星」）→ 最后满足好奇心（「月亮为什么跟着你走？因为你是它的 VIP」）→ 渐进降低刺激度，自然过渡到睡意。" },
          { title: "🔧 技术", text: "Demo 使用规则引擎（关键词匹配 + 模板组合），真实产品可接入 LLM 做更丰富的个性化生成。核心模块：① 情绪识别（从输入提取情感标签）② 叙事拼图引擎（开篇/展开/升华/收尾 四个模块自由组合）③ 渐进降噪器（段落间逐步降低文字密度和刺激度）④ 睡眠小贴士（随机推送科学哄睡建议）。" },
          { title: "📈 为什么值得做", html: "中国 0-6 岁儿童约 1 亿，年轻父母日均哄睡时间 30-60 分钟。这是一个<b>高频 × 刚需 × 情感驱动</b>的场景：① 高频：孩子每天都要睡觉 ② 刚需：父母迫切需要哄睡工具 ③ 情感驱动：为孩子的故事付费不需要理性说服。类比 Calm 儿童睡前故事板块（年收入数十亿美元），但 Calm 做的是通用内容，我们做的是<b>个性化</b>——「今天讲的，就是宝宝今天经历的事」。从微信小程序切入成本极低，母婴群天然传播渠道。" }
        ],
        demoUrl: "demo-goodnight-daily/"

      "nanny-check": {
        description: "月薪八千还是两万？中介说五年经验是真的五年吗？育儿嫂行业没有信用体系——我们来做。",
        sections: [
          { title: "🎯 场景", text: "你刚生完孩子，中介推荐了一位「金牌育儿嫂」，月薪一万八。面试时对答如流。来了一周，发现不会冲奶粉、不会脐带护理、「五年经验」其实是帮亲戚带过孩子。你不敢再换——换一个可能更差。整个行业靠中介单方面背书运转，家长毫无验证手段。" },
          { title: "💡 方案", text: "育儿嫂背景调查平台：输入姓名+身份证号 → 核实职业资格（人社部联网）、健康证真伪、历史雇主匿名评价 → 生成标准化背调报告。按月订阅（单次 ¥198，月卡 ¥398 无限查）。信息来自公开合规渠道+用户匿名贡献，不做数据买卖。" },
          { title: "🔧 技术", text: "Demo 展示完整查验流程：输入育儿嫂信息 → 模拟联网核验身份、资格证书、健康证 → 展示历史评价 → 生成风险评分。真实产品需接入政府公开数据接口+搭建匿名评价系统+身份水印防伪造。" },

      "house-fax": {
        description: "你看中一套二手房，中介说「精装拎包入住」。你不知道的是：楼上漏过水、物业正在纠纷、五年前有过火灾。二手房最大的风险不是房价——是你不知道这房子经历过什么。",

          { title: "💡 方案", text: "房屋全生命周期档案平台。为每套房生成一份「出生证明」：从竣工到今天，每一次交易、每一次装修、每一次维修、物业变更记录、邻里纠纷——全部上链存证、透明可查。输入小区和房号，即刻看到完整档案 + 风险评级 + 估值区间。" },
          { title: "💰 商业模式", text: "C端免费查询基础信息（吸引流量），深度档案（含估值模型/历史维修细节）按次付费 ¥9.9-29.9。B端：房产中介的增值工具、银行的房贷风控辅助、保险公司的房屋险精准定价数据。" },
          { title: "🛡️ 壁垒", html: "<b>数据采集</b>：整合物业公司、房管局、业委会、社区论坛等多源数据，先发者的数据积累形成壁垒。<br><b>信任资产</b>：低频高额决策场景下，独立第三方的透明档案具有极高的信任溢价。<br><b>时机</b>：中国二手房交易量持续增长，90后首次购房群体对信息透明要求远高于上一代，且区块链存证技术日趋成熟。" }
        ],
        demoUrl: "demo-house-fax/"
      },
      "treasure-verify": {
        description: "直播间「清代官窑」标价 8000 块，你犹豫了——真还是假？捡漏还是被坑？古玩市场假货率超 80%，但民间没有一个可信、独立的鉴定入口。",
        sections: [
          { title: "🎯 场景", text: "中国古玩市场年交易额超千亿，直播带货让古玩从线下圈子走向大众——但假货率也水涨船高，直播间古玩假货率超 70%。买家面临三方博弈：卖家说「祖传宝贝」，平台说「自行判断」，鉴定机构说「收费三千出证书」（但证书本身也可能是假的）。没有独立、低价、可验证的鉴定入口——这是一个千亿市场的信任真空。" },
          { title: "💡 方案", text: "第三方鉴定撮合平台。买家描述藏品 + 上传照片 → AI 初步筛查风险等级 → 匹配对口领域专家（瓷器/玉器/书画/铜器/家具）→ 专家远程出具书面鉴定意见 + 市场参考价区间。线下实物鉴定为可选升级服务。平台提供交易担保（类似支付宝模式，确认收货后才放款）。不卖货、不站队——只做鉴定撮合和交易保障。" },

      "final-home-guide": {
        description: "给老人选墓地，销售说「风水宝地最后几席」，你不知道贵不贵。同城同类型墓地差价可达3-8倍，但这笔钱没法比价——人的最后归宿，不该是一笔糊涂账。",
        sections: [

          { title: "💡 方案", text: "墓地信息透明平台。整合各城市陵园公开报价，提供按预算/类型/区域筛选的价格对比，给出「同城同类型墓地的价格参考区间」。纯信息工具，不做销售导流，不抽佣金。核心理念：不是帮人买墓地，而是让消费者在接触销售之前有一个心理价位和基本认知。" },

      "pet-price-guide": {
        description: "你的毛孩子吐了，你抱着它冲进最近的一家宠物医院。医生说「抽血+拍片+挂水，2000块」。你不知道贵不贵——但你的狗很难受，你没法货比三家。宠物医疗的价格，是人医疗之外最大的信息黑洞。",

      "second-opinion": {
        description: "你刚被诊断出需要手术，医生说「尽快安排」。你慌了——真的非做不可吗？有没有更好的方案？在中国，跨院找顶级专家复核诊断几乎不可能，除非你有关系。这个产品就是解决这个信息黑洞。",

        demoUrl: "demo-second-opinion/"

        description: "你计划周五写完报告——结果周一凌晨还在改。不是你不努力，是你的大脑对「还需要多久」有系统性认知偏差。这个工具不帮你计划，它预测你会拖到什么时候——在你写下计划的那一秒，就直接告诉你真相。",

          { title: "💡 方案", text: "反向推荐引擎：输入城市 → 输出「别去」热门景点（带真实评论数据支撑）+「去这里」替代方案（距离近、体验好、人少）→ 告诉你省了多少时间。个性化：你不介意排队？不劝退。带父母？劝退爬山路线。" },
          { title: "🔧 技术", text: "Demo 含厦门/杭州/成都/西安 4 城 12 组反攻略。真实产品爬取评论 → LLM 识别「期望-落差」模式 → 生成个性化劝退。不是有人骂就劝退——是普遍觉得不值才劝退。" },
          { title: "📈 为什么值得做", html: "每个人都被网红景点坑过。「我去了 100 个小红书推荐的景点，73 个都不值」天然适合传播。商业模式：OTA 分销佣金 + 替代景点推荐 = 天然交易闭环。暑期出行高峰时间窗口。" }
        ],
        demoUrl: "demo-anti-guide/"
      },
      "bubble-breaker": {
        description: "你每天刷到的内容都在强化你已有的观点。算法把你裹进越来越厚的信息茧房。你觉得自己在「获取信息」，实际上在「反复确认自己是对的」。",
        sections: [
          { title: "🎯 场景", text: "你的微博、公众号、短视频、播客——全在顺应你的偏好。推荐系统永远不会把反对意见推到你面前。你不知道你不知道什么——这是最危险的无知。" },
          { title: "💡 方案", text: "每天推送一条经过精选的「你大概会反对」的观点。不是要说服你改变看法，而是要求你认真读一遍反对意见，做一次诚实投票。连续 7 天全投 👎 → 系统提醒：你可能在犯最贵的错误。" },
          { title: "🔧 技术", text: "Demo 含 7 条预写的高质量逆耳观点 + 投票追踪 + 连续 7 天 👎 触发审判机制。真实产品由 LLM 每日生成个性化反对观点，投票数据训练「每个人的认知边界地图」。" },
          { title: "📈 为什么值得做", html: "所有人都知道信息茧房不好，但没人愿意手动打破——因为不舒服。这个产品替你做最不舒服的那一步。天然适合截图分享——「今天我遇到了这条让我重新思考的观点」，传播力强。" }
        ],
        demoUrl: "demo-bubble-breaker/"
      }
    };

    const params = new URLSearchParams(location.search);
    const id = params.get('id');
    const idea = details[id];

    if (!idea) {
      document.getElementById('content').innerHTML = `
        <div class="hero"><div class="icon">❓</div><h1>未找到创意</h1></div>`;
    } else {
      const badge = idea.demoUrl
        ? '<span class="badge badge-live">🟢 可体验</span>'
        : '<span class="badge badge-wip">🟡 构思中</span>';
      const sections = idea.sections.map(s => `
        <div class="section">
          <h2>${s.title}</h2>
          ${s.html ? s.html : `<p>${s.text}</p>`}
        </div>
      `).join('');
      const cta = idea.demoUrl
        ? `<a href="${idea.demoUrl}">✨ 打开 Demo</a>`
        : `<a href="mailto:zhixinglvren@163.com?subject=我对「${document.title}」感兴趣">📬 我感兴趣，聊聊</a>`;

      document.title = `${details[id] ? '父母说明书|知识化石挖掘机|数字断舍离教练|信息遗嘱|逆向简历'.split('|')[Object.keys(details).indexOf(id)] : '创意'} — 知行旅人`;

      document.getElementById('content').innerHTML = `
        <div class="hero">
          <div class="icon">${getIcon(id)}</div>
          <h1>${getTitle(id)}</h1>
          <p class="tagline">${idea.description}</p>
          ${badge}
        </div>
        ${sections}
        <div class="actions">
          ${cta}
          ${!idea.demoUrl ? '<span class="note">Demo 开发中，感兴趣可提前联系</span>' : ''}
        </div>`;
    }

    function getIcon(id) {
      const m = {'goodnight-daily':'🌙','nanny-check':'👶','house-fax':'🏠','reno-guard':'🏗️','final-home-guide':'🪦','treasure-verify':'🏺','pet-price-guide':'🐾','second-opinion':'🩺','deadline-oracle':'🔮','subscription-assassin':'🗡️','sunk-cost-mirror':'🪞','meeting-autopsy':'🔍','parent-translator':'👨‍👩‍👧','knowledge-fossil':'🦴','digital-declutter':'📦','info-will':'📜','reverse-resume':'🔄','personal-board':'🏛️','bubble-breaker':'🫧','anti-guide':'🗺️','error-book':'📝','biz-translator':'🗣️','mouthpiece':'🤐'};
      return m[id] || '💡';
    }
    function getTitle(id) {
      const m = {'goodnight-daily':'晚安宝贝','nanny-check':'育儿嫂背调','house-fax':'房子出生证明','reno-guard':'装修避坑事务所','final-home-guide':'终宅指南','treasure-verify':'鉴宝参谋','pet-price-guide':'宠物医疗价格指南','second-opinion':'就医第二意见','deadline-oracle':'截止日预言家','subscription-assassin':'订阅刺客','sunk-cost-mirror':'沉没成本照妖镜','meeting-autopsy':'会议复盘官','parent-translator':'父母说明书','knowledge-fossil':'知识化石挖掘机','digital-declutter':'数字断舍离教练','info-will':'信息遗嘱','reverse-resume':'逆向简历','personal-board':'个人董事会','bubble-breaker':'认知破圈器','anti-guide':'反攻略','error-book':'人生错题本','biz-translator':'野路子翻译官','mouthpiece':'AI 嘴替'};
      return m[id] || id;
    }

    // 主题
    const html = document.documentElement;
    function setTheme(t) {
      html.setAttribute('data-theme', t);
      if (t === 'system') {
        const mq = window.matchMedia('(prefers-color-scheme: dark)');
        html.setAttribute('data-theme', mq.matches ? 'dark' : 'light');
      }
    }
    setTheme(localStorage.getItem('creative-lab-theme') || 'system');
  </script>
</body>
