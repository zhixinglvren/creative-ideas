<!DOCTYPE html>
<html lang="zh-CN" data-theme="system">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>创意详情 — 知行旅人</title>
  <style>
    :root {
      --bg: #faf7f2; --bg-card: #ffffff; --border: #e8e2d6;
      --text: #2c2416; --text-muted: #8c8070;
      --accent: #e07a5f; --accent-hover: #c96a50;
      --radius: 12px;
    }
    [data-theme="dark"] {
      --bg: #1a1a1e; --bg-card: #252528; --border: #38383c;
      --text: #e8e8ec; --text-muted: #98989e;
      --accent: #f0a060; --accent-hover: #d48840;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg); color: var(--text); min-height: 100vh;
      transition: background 0.3s, color 0.3s;
    }
    .wrapper { max-width: 720px; margin: 0 auto; padding: 32px 20px 60px; }

    .back { display: inline-flex; align-items: center; gap: 6px; color: var(--accent);
      text-decoration: none; font-size: 0.9rem; margin-bottom: 28px; }
    .back:hover { text-decoration: underline; }

    .hero {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 32px; margin-bottom: 24px; text-align: center;
    }
    .hero .icon { font-size: 3rem; margin-bottom: 12px; }
    .hero h1 { font-size: 1.6rem; margin-bottom: 6px; }
    .hero .tagline { color: var(--text-muted); font-size: 1rem; margin-bottom: 14px; }
    .hero .badge {
      display: inline-block; font-size: 0.8rem; font-weight: 700;
      border-radius: 14px; padding: 4px 16px;
    }
    .badge-live { background: #2e8b5722; color: #2e8b57; border: 1px solid #2e8b5744; }
    .badge-wip  { background: #b8860b22; color: #b8860b; border: 1px solid #b8860b44; }

    .section {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 24px; margin-bottom: 18px;
    }
    .section h2 { font-size: 1rem; color: var(--accent); margin-bottom: 10px; }
    .section p, .section li { color: var(--text-muted); font-size: 0.9rem; line-height: 1.7; }
    .section ul { padding-left: 20px; }
    .section li { margin-bottom: 4px; }

    .actions { text-align: center; margin-top: 28px; }
    .actions a {
      display: inline-block; background: var(--accent); color: #fff;
      padding: 12px 32px; border-radius: 10px; text-decoration: none;
      font-weight: 700; font-size: 1rem; transition: background 0.2s;
    }
    .actions a:hover { background: var(--accent-hover); }
    .actions .note {
      display: block; color: var(--text-muted); font-size: 0.8rem; margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <a href="index.html" class="back">← 返回创意实验室</a>
    <div id="content"></div>
  </div>

  <script>
    const details = {
      "parent-translator": {
        description: "一通电话里，父母说「隔壁老王家孩子考上公务员了」，你听到的是「又在比」。他们真正想说的是：「我在担心你的未来」。",
        sections: [
          { title: "🎯 场景", text: "你和父母打电话。他们用「批评」表达关心，你用「沉默」表达尊重。结果双方都在用最真诚的方式互相误解。" },
          { title: "💡 方案", text: "一个极简的代际翻译器：输入父母的话 → 输出「他们真正的意思」+「你可以这样回」。不教人撒谎，而是帮人找到那条既诚实又不伤人的表达路径。" },
          { title: "🔧 技术", text: "纯前端规则引擎（Demo 阶段）→ 接入 LLM 做个性化理解（产品阶段）。微信小程序即可承载。" },
          { title: "📈 为什么值得做", html: "中国 1.7 亿独生子女正经历代际沟通困境。从「节日焦虑」场景切入，天然具有社交裂变属性。技术实现极轻。" }
        ],
        demoUrl: "demo-parent-translator/"
      },
      "knowledge-fossil": {
        description: "老王离职了——带着 5 年没人知道的隐性知识一起走了。那个奇怪的 status=99、那段不能删的 SQL 子查询、那个客户不能碰的功能……全没了。",
        sections: [
          { title: "🎯 场景", text: "新同事接手系统，翻遍 Confluence 只有骨架文档，Slack 里碎片信息，代码没有注释。每一个「当初为什么这样」都要靠猜。" },
          { title: "💡 方案", text: "AI 持续分析团队沟通记录（Slack/邮件/PR/代码注释），在老员工在职时就自动识别决策节点、提取 why 信息、生成知识化石层。" },
          { title: "🔧 技术", text: "LLM 从非结构化文本中提取决策链路 + 关联实体 + 生成结构化摘要。Demo 展示 7 条模拟化石，真实产品接入企业 IM + 代码仓库 API。" },
          { title: "📈 为什么值得做", html: "每个关键员工离职，隐性知识损失估值 $50k-$500k。企业知识管理是千亿美元市场。可以从工程团队的代码决策切入，再扩展到产品/设计/运营。" }
        ],
        demoUrl: "demo-knowledge-fossil/"
      },
      "digital-declutter": {
        description: "你的硬盘里堆了几年的文件——下载后从没打开过的 PDF、三年前的截图、改了 18 个版本的 PPT。「以后可能有用」是数字囤积症的头号理由。",
        sections: [
          { title: "🎯 场景", text: "周末想整理文件，打开下载文件夹看到 3000 个文件。你不知道哪些能删，于是又关掉了——「下次再说」。这个「下次」永远不会来。" },
          { title: "💡 方案", text: "AI 读懂文件内容，而不是只看文件名和日期。给出「可以安心删除」的清单，每条附带一句话理由——「这是 2023 年的会议纪要，相关项目已结项」。不是简单按日期排列，而是真的理解文件价值。" },
          { title: "🔧 技术", text: "本地运行（隐私优先），读取文件内容摘要 + 元数据，用 LLM 判断价值。不备份、不上传，所有处理在本地完成。" },
          { title: "📈 为什么值得做", html: "数字囤积症影响数十亿人。macOS/Windows 自带的存储管理只按大小/日期排列，不读内容。这是一个「AI + 本地计算」的 sweet spot——隐私敏感 + 语义理解需求强。" }
        ],
        demoUrl: null
      },
      "info-will": {
        description: "如果你明天不在了——你的微信聊天记录、GitHub 仓库、网盘文件、订阅服务……谁会知道它们的存在？谁会按你的意愿处理它们？",
        sections: [
          { title: "🎯 场景", text: "你有一个 GitHub 私人仓库、3 个网盘的资料、几十个在线账号。这些数字资产在你走后会成为「数字垃圾」——没人知道密码，没人知道哪些重要哪些不重要。" },
          { title: "💡 方案", text: "一份加密的「信息遗嘱」：列出你的数字资产清单 + 对每项资产的处置意愿（删除/转交/公开/保留），设置信任人。不是法律遗嘱的替代品，而是数字层面的补充——法律遗嘱管钱和房产，信息遗嘱管你的数字痕迹。" },
          { title: "🔧 技术", text: "本地加密存储 + 定时签到机制（如果你一段时间未响应，触发转交流程）。纯前端 + 端到端加密，不上传明文到任何服务器。" },
          { title: "📈 为什么值得做", html: "全球数字遗产市场规模到 2030 年预计达 $200B。Facebook 已有「纪念账号」功能，但太浅——只管社交账号，不管你的文件、代码、知识库、订阅。这是一个「临终关怀 × 数字隐私」的交叉蓝海。" }
        ],
        demoUrl: null
      },
      "reverse-resume": {
        description: "你的简历写的是你想展示的。但你的 GitHub 提交记录、代码注释风格、PR review 习惯——这些在讲另一个故事。AI 能从你的代码仓库反推出你真正的能力画像。",
        sections: [
          { title: "🎯 场景", text: "面试时你说「精通性能优化」——但你的 commits 显示你 80% 的工作是 CRUD。你的代码仓库比你的嘴诚实。不是要揭穿谁，而是帮人发现「我以为我擅长什么」和「我实际擅长什么」之间的差距。" },
          { title: "💡 方案", text: "读你的 Git 历史 → 分析代码类型分布、commit 频率、注释质量、PR review 风格 → 生成「真实能力画像」。不是打分，不是排名，是镜子——让你看到自己在代码世界里真正的样子。" },
          { title: "🔧 技术", text: "Git 历史分析（语言分布、commit 模式、issue 参与度）+ LLM 语义理解（代码注释质量、PR 讨论深度）。本地运行，隐私优先。" },
          { title: "📈 为什么值得做", html: "LinkedIn 只展示「声明式自我」。真正有价值的是「行为数据」——你的 GitHub 比你的简历更懂你。这可以成为新一代职业画像工具，也可以作为内省工具——了解自己的技术盲区。" }
        ],
        demoUrl: null
      },
      "personal-board": {
        description: "你要跳槽、买房、创业——朋友说「相信你的判断」。但你真正需要的是有人认真告诉你：这事儿可能怎么黄。",
        sections: [
          { title: "🎯 场景", text: "重大决策前，你会问朋友意见。但朋友没有义务认真跟你抬杠。付费顾问太贵。结果大多数人靠「直觉 + 模糊意见」做人生最重要的决定——这正是 Ray Dalio 花几十年想解决的问题。" },
          { title: "💡 方案", text: "AI 模拟 5 个结构化角色——投资人、用户自己、竞品视角、5年后的你、魔鬼代言人——对你的决策草案给出一针见血的反对意见。不是告诉你怎么做，而是让你看到你还没考虑到的风险。最终决策权在你。" },
          { title: "🔧 技术", text: "规则引擎识别决策类型（跳槽/买房/搬家/学习/创业）+ 角色模板生成批判性提问。真实产品接入 LLM 可做到完全个性化。Demo 覆盖 5 种场景。" },
          { title: "📈 为什么值得做", html: "每个人一生做 ~30 个重大决策，大多数靠直觉。AI 决策辅助市场正在爆发，但市面上都是「给你答案」的算命型产品。「告诉你可能错在哪」是差异化蓝海——LLM 天生擅长角色扮演 + 批判性思维。" }
        ],
        demoUrl: "demo-personal-board/"
      },
      "biz-translator": {
        description: "老板说「对齐颗粒度」，你听到的是「又要加班了」。黑话伤害打工人的精神世界——这里帮你拆弹。",
        sections: [
          { title: "🎯 场景", text: "每天的会议、邮件、OKR 评审——全是黑话。你以为只有你不懂？其实每个人都在假装懂。结果是：听的人猜，说的人演，活干偏了没人知道。" },
          { title: "💡 方案", text: "双向翻译器。黑话→人话：输入老板的话，翻译成「你实际需要做的事」。人话→黑话：输入你想说的，翻译成老板爱听的版本（不改原意，只换包装）。" },
          { title: "🔧 技术", text: "规则引擎匹配常见黑话词汇表（20 条）+ 模式匹配生成翻译。真实产品 LLM 做语义翻译，支持自定义人设（你的老板/你的客户）自适应措辞。" },
          { title: "📈 为什么值得做", html: "每一个打工人都是潜在用户。画面感极强——截图就是天然 meme。企业版可集成到 Slack/飞书/钉钉，做消息实时黑话翻译。最轻量的 B2B SaaS 切入点。" }
        ],
        demoUrl: "demo-biz-translator/"
      },
      "error-book": {
        description: "你不是在犯不同的错误——你是在反复掉进同一个坑。记下来、找模式、打补丁。",
        sections: [
          { title: "🎯 场景", text: "每个人都会犯错。但大多数人今天犯的错和五年前犯的错本质一样——只是场景换了。因为你没有系统性地回顾自己犯过的错。" },
          { title: "💡 方案", text: "一个「个人错误数据库」：随手记下每次懊悔的瞬间 → AI 自动归类模式 → 发现你反复掉进的坑 → 给出可执行的「打补丁」处方。不是用来后悔，是用来校准。" },
          { title: "🔧 技术", text: "自由文本输入 → LLM 语义分类（冲动决策/逃避冲突/过度承诺/完美主义等）→ 时间序列聚类 → 自动生成个性化模式报告。Demo 预置 6 条错题 + 规则分析引擎。" },
          { title: "📈 为什么值得做", html: "「个人数据」赛道最大未开发的金矿。Fitbit 告诉你走了多少步，Duolingo 告诉你学了多少词——但没人告诉你「你的人生决策模式是什么样的」。错题本是最轻量的入口，但长期价值巨大：你的错误模式就是你的操作系统漏洞。" }
        ],
        demoUrl: "demo-error-book/"
      },
      "anti-guide": {
        description: "你去了小红书收藏的「此生必去」——发现是一排 300 人排队的栈道。没人告诉你别去哪。整个旅行内容生态只推荐，不动退。",
        sections: [
          { title: "🎯 场景", text: "攒了五天年假，刷了两周攻略，到目的地发现：秘境全是人、小众餐厅菜单有 6 种语言、拍的照片和小红书一模一样。浪费时间不可怕——浪费年假才可怕。" },
          { title: "💡 方案", text: "反向推荐引擎：输入城市 → 输出「别去」热门景点（带真实评论数据支撑）+「去这里」替代方案（距离近、体验好、人少）→ 告诉你省了多少时间。个性化：你不介意排队？不劝退。带父母？劝退爬山路线。" },
          { title: "🔧 技术", text: "Demo 含厦门/杭州/成都/西安 4 城 12 组反攻略。真实产品爬取评论 → LLM 识别「期望-落差」模式 → 生成个性化劝退。不是有人骂就劝退——是普遍觉得不值才劝退。" },
          { title: "📈 为什么值得做", html: "每个人都被网红景点坑过。「我去了 100 个小红书推荐的景点，73 个都不值」天然适合传播。商业模式：OTA 分销佣金 + 替代景点推荐 = 天然交易闭环。暑期出行高峰时间窗口。" }
        ],
        demoUrl: "demo-anti-guide/"
      },
      "bubble-breaker": {
        description: "你每天刷到的内容都在强化你已有的观点。算法把你裹进越来越厚的信息茧房。你觉得自己在「获取信息」，实际上在「反复确认自己是对的」。",
        sections: [
          { title: "🎯 场景", text: "你的微博、公众号、短视频、播客——全在顺应你的偏好。推荐系统永远不会把反对意见推到你面前。你不知道你不知道什么——这是最危险的无知。" },
          { title: "💡 方案", text: "每天推送一条经过精选的「你大概会反对」的观点。不是要说服你改变看法，而是要求你认真读一遍反对意见，做一次诚实投票。连续 7 天全投 👎 → 系统提醒：你可能在犯最贵的错误。" },
          { title: "🔧 技术", text: "Demo 含 7 条预写的高质量逆耳观点 + 投票追踪 + 连续 7 天 👎 触发审判机制。真实产品由 LLM 每日生成个性化反对观点，投票数据训练「每个人的认知边界地图」。" },
          { title: "📈 为什么值得做", html: "所有人都知道信息茧房不好，但没人愿意手动打破——因为不舒服。这个产品替你做最不舒服的那一步。天然适合截图分享——「今天我遇到了这条让我重新思考的观点」，传播力强。" }
        ],
        demoUrl: "demo-bubble-breaker/"
      }
    };

    const params = new URLSearchParams(location.search);
    const id = params.get('id');
    const idea = details[id];

    if (!idea) {
      document.getElementById('content').innerHTML = `
        <div class="hero"><div class="icon">❓</div><h1>未找到创意</h1></div>`;
    } else {
      const badge = idea.demoUrl
        ? '<span class="badge badge-live">🟢 可体验</span>'
        : '<span class="badge badge-wip">🟡 构思中</span>';
      const sections = idea.sections.map(s => `
        <div class="section">
          <h2>${s.title}</h2>
          ${s.html ? s.html : `<p>${s.text}</p>`}
        </div>
      `).join('');
      const cta = idea.demoUrl
        ? `<a href="${idea.demoUrl}">✨ 打开 Demo</a>`
        : `<a href="mailto:zhixinglvren@163.com?subject=我对「${document.title}」感兴趣">📬 我感兴趣，聊聊</a>`;

      document.title = `${details[id] ? '父母说明书|知识化石挖掘机|数字断舍离教练|信息遗嘱|逆向简历'.split('|')[Object.keys(details).indexOf(id)] : '创意'} — 知行旅人`;

      document.getElementById('content').innerHTML = `
        <div class="hero">
          <div class="icon">${getIcon(id)}</div>
          <h1>${getTitle(id)}</h1>
          <p class="tagline">${idea.description}</p>
          ${badge}
        </div>
        ${sections}
        <div class="actions">
          ${cta}
          ${!idea.demoUrl ? '<span class="note">Demo 开发中，感兴趣可提前联系</span>' : ''}
        </div>`;
    }

    function getIcon(id) {
      const m = {'parent-translator':'👨‍👩‍👧','knowledge-fossil':'🦴','digital-declutter':'📦','info-will':'📜','reverse-resume':'🔄','personal-board':'🏛️','bubble-breaker':'🫧','anti-guide':'🗺️','error-book':'📝','biz-translator':'🗣️'};
      return m[id] || '💡';
    }
    function getTitle(id) {
      const m = {'parent-translator':'父母说明书','knowledge-fossil':'知识化石挖掘机','digital-declutter':'数字断舍离教练','info-will':'信息遗嘱','reverse-resume':'逆向简历','personal-board':'个人董事会','bubble-breaker':'认知破圈器','anti-guide':'反攻略','error-book':'人生错题本','biz-translator':'野路子翻译官'};
      return m[id] || id;
    }

    // 主题
    const html = document.documentElement;
    function setTheme(t) {
      html.setAttribute('data-theme', t);
      if (t === 'system') {
        const mq = window.matchMedia('(prefers-color-scheme: dark)');
        html.setAttribute('data-theme', mq.matches ? 'dark' : 'light');
      }
    }
    setTheme(localStorage.getItem('creative-lab-theme') || 'system');
  </script>
</body>
</html>
