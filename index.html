<!DOCTYPE html>
<html lang="zh-CN" data-theme="system">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>知行旅人 · 创意实验室</title>
  <style>
    /* ── 主题 ── */
    :root {
      --bg: #faf7f2; --bg-card: #ffffff; --border: #e8e2d6;
      --text: #2c2416; --text-muted: #8c8070;
      --accent: #e07a5f; --accent-hover: #c96a50;
      --shadow: 0 1px 8px rgba(0,0,0,0.05);
      --radius: 12px;
    }
    [data-theme="dark"] {
      --bg: #1a1a1e; --bg-card: #252528; --border: #38383c;
      --text: #e8e8ec; --text-muted: #98989e;
      --accent: #f0a060; --accent-hover: #d48840;
      --shadow: 0 1px 8px rgba(0,0,0,0.2);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg); color: var(--text); min-height: 100vh;
      transition: background 0.3s, color 0.3s;
    }

    /* ── 布局 ── */
    .wrapper { max-width: 960px; margin: 0 auto; padding: 40px 20px 60px; }

    /* ── Header ── */
    .top-bar {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
    }
    .top-bar h1 { font-size: 1.5rem; font-weight: 800; }
    .top-bar .sub { color: var(--text-muted); font-size: 0.85rem; margin-top: 2px; }
    .theme-switch {
      display: flex; gap: 3px; background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 8px; padding: 2px;
    }
    .theme-switch button {
      border: none; background: transparent; padding: 5px 10px; border-radius: 6px;
      font-size: 0.78rem; color: var(--text-muted); cursor: pointer; transition: all 0.15s;
      font-family: inherit;
    }
    .theme-switch button.active { background: var(--accent); color: #fff; }

    /* ── 搜索 ── */
    .search-row {
      display: flex; gap: 10px; margin-bottom: 24px;
    }
    .search-row input {
      flex: 1; background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px;
      padding: 10px 16px; font-size: 0.95rem; color: var(--text); outline: none;
      font-family: inherit; transition: border-color 0.2s;
    }
    .search-row input:focus { border-color: var(--accent); }
    .search-row input::placeholder { color: var(--text-muted); opacity: 0.5; }
    .search-row .count {
      font-size: 0.8rem; color: var(--text-muted);
      display: flex; align-items: center; white-space: nowrap;
    }

    /* ── 网格 ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 14px;
      margin-bottom: 28px;
    }
    @media (max-width: 800px) { .grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 480px) { .grid { grid-template-columns: repeat(2, 1fr); gap: 10px; } }

    .tile {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 20px 16px 16px; text-align: center; cursor: pointer;
      box-shadow: var(--shadow); transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
      text-decoration: none; color: inherit; display: block;
    }
    .tile:hover {
      transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,0.1);
      border-color: var(--accent);
    }
    .tile .icon { font-size: 2rem; margin-bottom: 8px; line-height: 1; }
    .tile .name {
      font-size: 0.9rem; font-weight: 700; color: var(--text);
      margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .tile .tagline {
      font-size: 0.72rem; color: var(--text-muted);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .tile .badge {
      display: inline-block; margin-top: 10px; font-size: 0.65rem; font-weight: 700;
      border-radius: 10px; padding: 2px 10px;
    }
    .badge-live { background: #2e8b5722; color: #2e8b57; border: 1px solid #2e8b5744; }
    .badge-wip  { background: #b8860b22; color: #b8860b; border: 1px solid #b8860b44; }

    /* ── 空结果 ── */
    .empty {
      text-align: center; padding: 80px 20px; color: var(--text-muted);
      grid-column: 1 / -1;
    }
    .empty .icon { font-size: 3rem; margin-bottom: 12px; }

    /* ── 分页 ── */
    .pagination {
      display: flex; justify-content: center; align-items: center; gap: 6px;
    }
    .pagination button {
      border: 1px solid var(--border); background: var(--bg-card); color: var(--text);
      padding: 8px 14px; border-radius: 8px; font-size: 0.85rem; cursor: pointer;
      font-family: inherit; transition: all 0.15s;
    }
    .pagination button:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
    .pagination button:disabled { opacity: 0.3; cursor: not-allowed; }
    .pagination button.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .pagination .ellipsis { color: var(--text-muted); padding: 8px 4px; font-size: 0.85rem; }

    /* ── Footer ── */
    footer {
      margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--border);
      color: var(--text-muted); font-size: 0.78rem; text-align: center;
    }
    footer a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="top-bar">
      <div>
        <h1>🧪 知行旅人 · 创意实验室</h1>
        <p class="sub">有趣的点子 × Demo → 找到需要它的人</p>
      </div>
      <div class="theme-switch" id="themeSwitch">
        <button data-theme="system" class="active">💻 系统</button>
        <button data-theme="light">☀️</button>
        <button data-theme="dark">🌙</button>
      </div>
    </div>

    <div class="search-row">
      <input type="text" id="searchInput" placeholder="搜索创意点子…" oninput="search()">
      <span class="count" id="resultCount"></span>
    </div>

    <div class="grid" id="grid"></div>
    <div class="pagination" id="pagination"></div>

    <footer>
      📬 <a href="mailto:zhixinglvren@163.com">zhixinglvren@163.com</a> · © 2026 知行旅人
    </footer>
  </div>

  <script>
    const PER_PAGE = 20;
    let allIdeas = [];
    let filtered = [];
    let page = 1;

    // 数据内嵌（本地 file:// 也能用，GitHub Pages 无需额外请求）
    allIdeas = [
      { "id": "anti-guide", "icon": "🗺️", "title": "反攻略", "tagline": "告诉你别去哪+替代方案", "status": "live", "category": "旅行" },
      { "id": "bubble-breaker", "icon": "🫧", "title": "认知破圈器", "tagline": "每天一条逆耳观点", "status": "live", "category": "认知成长" },
      { "id": "personal-board", "icon": "🏛️", "title": "个人董事会", "tagline": "重大决策AI陪练", "status": "live", "category": "AI决策" },
      { "id": "knowledge-fossil", "icon": "🦴", "title": "知识化石挖掘机", "tagline": "隐性知识不流失", "status": "live", "category": "企业效率" },
      { "id": "parent-translator", "icon": "👨‍👩‍👧", "title": "父母说明书", "tagline": "代际沟通翻译器", "status": "live", "category": "情感科技" },
      { "id": "digital-declutter", "icon": "📦", "title": "数字断舍离教练", "tagline": "AI 帮你删文件", "status": "wip", "category": "个人效率" },
      { "id": "info-will", "icon": "📜", "title": "信息遗嘱", "tagline": "数字身后事整理师", "status": "wip", "category": "数字遗产" },
      { "id": "reverse-resume", "icon": "🔄", "title": "逆向简历", "tagline": "AI 反推真实能力", "status": "wip", "category": "职业发展" }
    ];
    search();

    function search() {
      const q = document.getElementById('searchInput').value.trim().toLowerCase();
      filtered = q
        ? allIdeas.filter(i =>
            i.title.toLowerCase().includes(q) ||
            i.tagline.toLowerCase().includes(q) ||
            i.category.toLowerCase().includes(q))
        : allIdeas;
      page = 1;
      render();
    }

    function render() {
      const total = filtered.length;
      const totalPages = Math.ceil(total / PER_PAGE);
      if (page > totalPages) page = totalPages || 1;
      const start = (page - 1) * PER_PAGE;
      const items = filtered.slice(start, start + PER_PAGE);

      document.getElementById('resultCount').textContent = total ? `共 ${total} 个` : '';

      const grid = document.getElementById('grid');
      if (items.length === 0) {
        grid.innerHTML = `<div class="empty"><div class="icon">🔍</div>没找到匹配的创意</div>`;
      } else {
        grid.innerHTML = items.map(i => `
          <a href="idea.html?id=${i.id}" class="tile">
            <div class="icon">${i.icon}</div>
            <div class="name">${i.title}</div>
            <div class="tagline">${i.tagline}</div>
            <span class="badge ${i.status === 'live' ? 'badge-live' : 'badge-wip'}">${i.status === 'live' ? '可体验' : '构思中'}</span>
          </a>
        `).join('');
      }

      // 分页
      const pag = document.getElementById('pagination');
      if (totalPages <= 1) { pag.innerHTML = ''; return; }
      let html = '';
      html += `<button ${page <= 1 ? 'disabled' : ''} onclick="go(${page-1})">‹ 上一页</button>`;
      for (let p = 1; p <= totalPages; p++) {
        if (totalPages > 7 && p > 2 && p < totalPages - 1 && Math.abs(p - page) > 1) {
          if (p === 3) html += '<span class="ellipsis">…</span>';
          continue;
        }
        html += `<button class="${p === page ? 'active' : ''}" onclick="go(${p})">${p}</button>`;
      }
      html += `<button ${page >= totalPages ? 'disabled' : ''} onclick="go(${page+1})">下一页 ›</button>`;
      pag.innerHTML = html;
    }

    function go(p) {
      page = p;
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // ── 主题 ──
    const html = document.documentElement;
    function setTheme(t) {
      html.setAttribute('data-theme', t);
      document.querySelectorAll('#themeSwitch button').forEach(b =>
        b.classList.toggle('active', b.dataset.theme === t));
      localStorage.setItem('creative-lab-theme', t);
      if (t === 'system') {
        const mq = window.matchMedia('(prefers-color-scheme: dark)');
        html.setAttribute('data-theme', mq.matches ? 'dark' : 'light');
      }
    }
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
      if (localStorage.getItem('creative-lab-theme') === 'system') setTheme('system');
    });
    document.getElementById('themeSwitch').addEventListener('click', e => {
      if (e.target.tagName === 'BUTTON') setTheme(e.target.dataset.theme);
    });
    setTheme(localStorage.getItem('creative-lab-theme') || 'system');

    // 页面加载完成，search() 已在上面调用
  </script>
</body>
</html>
