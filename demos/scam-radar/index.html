<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>防骗雷达 · 创意实验室</title>
<style>
  :root { --accent: #ef4444; --bg: #0f1117; --card: #1a1d28; --border: #2a2d3a; --text: #e1e4ed; --muted: #7b7f8c; --green: #10b981; --amber: #f59e0b; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .wrapper { max-width: 600px; margin: 0 auto; padding: 48px 20px; }
  .back { display: inline-block; color: var(--muted); text-decoration: none; font-size: 0.8rem; margin-bottom: 16px; }
  h1 { font-size: 1.6rem; margin-bottom: 4px; }
  .sub { color: var(--muted); font-size: 0.85rem; margin-bottom: 28px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 18px 20px; margin-bottom: 12px; cursor: pointer; transition: border-color 0.2s; }
  .card:hover { border-color: var(--accent); }
  .card h3 { font-size: 0.92rem; margin-bottom: 4px; }
  .card .tag { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 0.7rem; background: rgba(239,68,68,0.12); color: var(--accent); margin-right: 6px; }

  .result { display:none; background: var(--card); border: 1px solid var(--accent); border-radius: 14px; padding: 22px; margin-top: 16px; }
  .result h2 { font-size: 1.1rem; margin-bottom: 12px; }
  .verdict { font-size: 1.4rem; font-weight: 800; padding: 10px 16px; border-radius: 10px; text-align: center; margin-bottom: 16px; }
  .verdict.scam { background: rgba(239,68,68,0.15); color: var(--accent); }
  .verdict.safe { background: rgba(16,185,129,0.12); color: var(--green); }
  .verdict.warn { background: rgba(245,158,11,0.12); color: var(--amber); }

  .detail { font-size: 0.86rem; line-height: 1.8; margin-bottom: 14px; }
  .detail strong { color: var(--accent); }
  .actions { background: rgba(16,185,129,0.06); border-radius: 10px; padding: 14px 16px; font-size: 0.84rem; line-height: 1.9; }
  .actions span { color: var(--green); }

  .upload { background: var(--card); border: 2px dashed var(--border); border-radius: 14px; padding: 32px; text-align: center; margin-bottom: 16px; cursor: pointer; transition: border-color 0.2s; }
  .upload:hover { border-color: var(--accent); }
  .upload-icon { font-size: 2rem; margin-bottom: 8px; }
  .upload-text { font-size: 0.85rem; color: var(--muted); }

  @media (max-width: 480px) {
    .wrapper { padding: 32px 14px; }
  }
</style>
</head>
<body>
<div class="wrapper">
  <a href="https://zhixinglvren.github.io/creative-ideas/" class="back">← 创意实验室</a>
  <h1>🛡️ 防骗雷达</h1>
  <p class="sub">爸妈收到可疑消息？截图发过来，AI 秒识骗局</p>

  <div class="upload" onclick="document.getElementById('file-inp').click()">
    <div class="upload-icon">📸</div>
    <div class="upload-text">点击上传截图，或选择下方骗局样例体验</div>
    <input type="file" id="file-inp" accept="image/*" style="display:none" onchange="handleUpload()">
  </div>

  <div style="font-size:0.8rem;color:var(--muted);margin-bottom:12px;">👇 常见骗局样例（点击查看 AI 分析）</div>
  <div id="samples"></div>
  <div id="output"></div>
</div>

<script>
var samples = [
  {
    title: '医保卡停用',
    tag: '冒充公检法',
    msg: '【社保中心】您的医保卡已被停用，请于今日内点击 http://ybk.b3xz.cn 进行认证，恢复使用。如有疑问，请致电 010-5839xxxx',
    verdict: 'scam',
    label: '🔴 诈骗消息',
    analysis: '冒充社保中心，利用"医保卡停用"制造紧迫感。域名 b3xz.cn 为山寨网站，与官方 gov.cn 无关。社保部门<strong>不会</strong>通过短信链接要求认证。',
    actions: ['❌ 绝对不要点击链接', '📞 拨打 12333 社保热线核实', '🚫 将号码加入黑名单', '📱 下载国家反诈中心 APP 举报']
  },
  {
    title: '中奖通知',
    tag: '虚假中奖',
    msg: '【恭喜中奖】尊敬的用户，您在《奔跑吧》场外抽奖中获得二等奖 18.8 万元！请登录 www.pb88.top 填写银行卡信息领取奖金。',
    verdict: 'scam',
    label: '🔴 诈骗消息',
    analysis: '经典"天上掉馅饼"型骗局。域名 pb88.top 为境外赌博类域名，以高额奖金诱导填写银行卡信息。<strong>任何要求先填卡号才能领奖的，100% 是诈骗。</strong>',
    actions: ['❌ 不要回复，不要输入任何个人信息', '🔒 如已输入卡号，立即联系银行冻结', '📱 通过反诈 APP 提交号码和网址']
  },
  {
    title: '兼职刷单',
    tag: '刷单诈骗',
    msg: '【招聘】诚聘淘宝刷单手，每单30-80元，日结300-500元，不限时间地点，手机即可操作，加QQ 2847xxxxx 了解详情。',
    verdict: 'scam',
    label: '🔴 诈骗消息',
    analysis: '刷单是违法行为，且此类招聘<strong>99% 是诈骗</strong>。套路：前几单返小额佣金建立信任 → 大单后直接拉黑 → 还可能骗取"保证金""解冻费"。',
    actions: ['❌ 兼职刷单本身就是违法', '🚫 不添加任何 QQ/微信', '💡 记住：高回报零门槛 = 诈骗']
  },
  {
    title: '快递丢失理赔',
    tag: '冒充客服',
    msg: '【顺丰速运】您好，您的快递 SF1234567890 在运输中丢失，我们将双倍赔偿。请添加微信 sfkf001 领取赔款，逾期作废。',
    verdict: 'scam',
    label: '🔴 诈骗消息',
    analysis: '冒充快递客服，利用"赔偿"诱导添加微信。正常快递理赔<strong>在官方 APP 内完成</strong>，不会要求添加个人微信。添加后骗子会发送钓鱼链接或诱导转账。',
    actions: ['📦 在快递官方 APP 查物流状态', '❌ 不添加任何个人微信/QQ', '📞 通过官方客服电话核实']
  },
  {
    title: '子女出事急用钱',
    tag: '冒充亲属',
    msg: '妈，我出事了，手机摔坏了借同学的。我打架把对方打伤，对方要2万私了，你快点转过来，不然我就被拘留了！卡号：6222 xxxx xxxx 张伟',
    verdict: 'scam',
    label: '🔴 诈骗消息',
    analysis: '冒充子女制造紧急情境，利用父母的爱子心理阻断理性思考。<strong>核心漏洞</strong>：电话打不通（说"手机坏了"）、不允许核实（说"来不及"）。任何催促转账的陌生消息都应先电话核实。',
    actions: ['📞 先打子女常用号码核实', '❌ 绝不向陌生账户转账', '🏷️ 约定家庭暗号（只有你们知道的词）', '🚔 如已转账，立即报警 110']
  },
  {
    title: '银行积分兑换',
    tag: '伪基站',
    msg: '【招商银行】您的信用卡积分 28,600 分即将清零，请速登录 www.cmb-point.com 兑换 iPhone 15 等好礼！退订回 T',
    verdict: 'scam',
    label: '🔴 诈骗消息',
    analysis: '伪基站冒充银行发送钓鱼短信。域名 cmb-point.com 不是招商银行官方域名（正确为 cmbchina.com）。点击后会要求输入卡号、密码、CVV 码，<strong>直接盗刷</strong>。',
    actions: ['❌ 不点击链接，不回 T', '🏦 在银行官方 APP 查积分', '📱 举报号码至 12321 网络不良信息举报中心']
  }
];

function renderSamples() {
  var html = '';
  samples.forEach(function(s, i) {
    html += '<div class="card" onclick="analyze('+i+')">';
    html += '<h3>'+s.title+'</h3>';
    html += '<div style="font-size:0.78rem;color:var(--muted);margin-top:4px;line-height:1.6;">'+s.msg.substring(0,80)+'...</div>';
    html += '<div style="margin-top:6px;"><span class="tag">'+s.tag+'</span></div>';
    html += '</div>';
  });
  document.getElementById('samples').innerHTML = html;
}

function analyze(i) {
  var s = samples[i];
  var cls = s.verdict === 'scam' ? 'scam' : s.verdict === 'warn' ? 'warn' : 'safe';
  var html = '<div class="result">';
  html += '<h2>🔍 AI 分析结果</h2>';
  html += '<div class="verdict '+cls+'">'+s.label+'</div>';
  html += '<div class="detail"><strong>原始消息：</strong>'+s.msg+'</div>';
  html += '<div class="detail"><strong>识别分析：</strong>'+s.analysis+'</div>';
  html += '<div class="actions"><strong>建议操作：</strong><br>';
  s.actions.forEach(function(a) { html += '<span>'+a+'</span><br>'; });
  html += '</div></div>';
  document.getElementById('output').innerHTML = html;
  document.getElementById('output').scrollIntoView({ behavior: 'smooth' });
}

function handleUpload() {
  var s = samples[Math.floor(Math.random() * samples.length)];
  analyze(samples.indexOf(s));
}

renderSamples();
</script>
</body>
</html>
